<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ma Collection de Cartes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2b1055, #000);
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      font-size: 2.5em;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.8;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card h2 {
      margin: 0;
    }

    .card p {
      margin: 5px 0;
      opacity: 0.8;
    }

    .delete {
      margin-top: 10px;
      background: #e63946;
      width: 100%;
    }

    .total {
      margin-top: 20px;
      font-size: 1.2em;
      text-align: center;
    }

    @media (max-width: 600px) {
      .form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<h1>🃏 Ma Collection</h1>

<div class="container">

  <div class="form">
    <input id="name" placeholder="Nom de la carte">
    <input id="set" placeholder="Extension">
    <input id="price" placeholder="Prix (€)">
    <button onclick="addCard()">Ajouter</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="total" id="total"></div>

</div>

<script>
let cards = JSON.parse(localStorage.getItem("cards")) || [];

function save() {
  localStorage.setItem("cards", JSON.stringify(cards));
}

function display() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  let total = 0;

  cards.forEach((card, index) => {
    total += Number(card.price) || 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>${card.name}</h2>
      <p>${card.set}</p>
      <p><strong>${card.price} €</strong></p>
      <button class="delete" onclick="removeCard(${index})">Supprimer</button>
    `;

    container.appendChild(div);
  });

  document.getElementById("total").innerText =
    "💰 Valeur totale : " + total + " €";
}

function addCard() {
  const name = document.getElementById("name").value;
  const set = document.getElementById("set").value;
  const price = document.getElementById("price").value;

  if (!name) return;

  cards.push({ name, set, price });
  save();
  display();

  document.getElementById("name").value = "";
  document.getElementById("set").value = "";
  document.getElementById("price").value = "";
}

function removeCard(index) {
  cards.splice(index, 1);
  save();
  display();
}

display();
</script>

</body>
</html>
